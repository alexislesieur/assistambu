services:
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: assistambu_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: assistambu
      MYSQL_USER: assistambu
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: arm64v8/phpmyadmin
    container_name: assistambu_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: assistambu
      PMA_PASSWORD: secret
    ports:
      - "8081:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
